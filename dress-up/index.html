<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐰 Dress Up Fun - Bunny ABC</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
    }

    /* ========== 场景选择页 ========== */
    .scene-select {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #FFE4EC 0%, #FFF5F8 50%, #E8F4FD 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .scene-select.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .scene-title {
      font-size: 36px;
      font-weight: 800;
      color: #FF6B9D;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 #fff;
    }

    .scene-subtitle {
      font-size: 18px;
      color: #888;
      margin-bottom: 40px;
    }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 700px;
      width: 90%;
    }

    .scene-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 107, 157, 0.15);
      border: 3px solid transparent;
    }

    .scene-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(255, 107, 157, 0.25);
      border-color: #FFB6C1;
    }

    .scene-card.selected {
      border-color: #FF6B9D;
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(255, 107, 157, 0.35);
      animation: cardPulse 1.5s ease-in-out infinite;
    }

    @keyframes cardPulse {
      0%, 100% { box-shadow: 0 8px 25px rgba(255, 107, 157, 0.35); }
      50% { box-shadow: 0 8px 35px rgba(255, 107, 157, 0.55); }
    }

    .scene-card:active {
      transform: translateY(-2px);
    }

    .scene-card-emoji {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .scene-card-name {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }

    .scene-card-en {
      font-size: 13px;
      color: #999;
    }

    .keyboard-hint {
      margin-top: 32px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }

    .keyboard-hint kbd {
      display: inline-block;
      padding: 2px 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin: 0 2px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    /* ========== 游戏主页面 ========== */
    .game-page {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
    }

    .game-page.active {
      display: flex;
    }

    /* 顶部栏 */
    .top-bar {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      z-index: 10;
      position: relative;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: none;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    .theme-info {
      text-align: center;
    }

    .theme-name {
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }

    .theme-emoji {
      font-size: 24px;
      margin-right: 6px;
    }

    .progress-text {
      font-size: 16px;
      font-weight: 600;
      color: #FF6B9D;
      min-width: 60px;
      text-align: right;
    }

    /* 游戏主区域 - 左右布局 */
    .game-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
      gap: 30px;
    }

    /* 兔子容器 - 左侧 */
    .bunny-container {
      position: relative;
      width: min(42vh, 45vw);
      height: min(42vh, 45vw);
      max-width: 380px;
      max-height: 380px;
      flex-shrink: 0;
      z-index: 2;
    }

    .bunny-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 20px;
      position: absolute;
      top: 0;
      left: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .bunny-img.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .bunny-img.pop {
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ========== 天气特效层 ========== */
    .weather-effects {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 5;
    }

    .weather-effects > * {
      position: absolute;
      pointer-events: none;
    }

    /* --- 云朵 (晴天) --- */
    .cloud {
      font-size: 40px;
      opacity: 0.7;
      animation: cloudFloat linear infinite;
    }

    @keyframes cloudFloat {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(calc(100vw + 100px)); }
    }

    /* --- 阳光光线 (晴天) --- */
    .sun-ray {
      position: absolute;
      top: -20%;
      width: 80px;
      height: 140%;
      background: linear-gradient(180deg, rgba(255, 236, 160, 0.35) 0%, rgba(255, 236, 160, 0) 100%);
      transform-origin: top center;
      animation: sunRaySway 5s ease-in-out infinite;
    }

    @keyframes sunRaySway {
      0%, 100% { transform: rotate(-5deg); opacity: 0.4; }
      50% { transform: rotate(5deg); opacity: 0.7; }
    }

    /* --- 雨滴 (雨天) --- */
    .raindrop {
      width: 2px;
      height: 20px;
      background: linear-gradient(180deg, rgba(174, 214, 241, 0) 0%, rgba(174, 214, 241, 0.8) 100%);
      border-radius: 2px;
      animation: rainFall linear infinite;
    }

    @keyframes rainFall {
      0% { transform: translateY(-20px); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0.3; }
    }

    /* --- 雪花 (雪天) --- */
    .snowflake {
      color: #fff;
      text-shadow: 0 0 4px rgba(255,255,255,0.8);
      animation: snowFall linear infinite;
    }

    @keyframes snowFall {
      0% {
        transform: translateY(-20px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translateY(100vh) translateX(40px) rotate(360deg);
        opacity: 0.5;
      }
    }

    /* --- 水泡 (泳池) --- */
    .bubble {
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(174, 214, 241, 0.3));
      border: 1px solid rgba(255,255,255,0.4);
      animation: bubbleRise ease-in infinite;
    }

    @keyframes bubbleRise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      10% { opacity: 0.8; }
      90% { opacity: 0.6; }
      100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
      }
    }

    /* --- 波光 (泳池) --- */
    .sparkle-light {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.6);
      animation: sparkleTwinkle 2s ease-in-out infinite;
    }

    @keyframes sparkleTwinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* --- 爱心 (医生) --- */
    .floating-heart {
      color: #FF6B9D;
      animation: heartFloat ease-in-out infinite;
      opacity: 0.6;
    }

    @keyframes heartFloat {
      0% {
        transform: translateY(0) scale(1) rotate(-5deg);
        opacity: 0;
      }
      20% { opacity: 0.7; }
      80% { opacity: 0.5; }
      100% {
        transform: translateY(-80vh) scale(0.8) rotate(5deg);
        opacity: 0;
      }
    }

    /* --- 小星星 (医生) --- */
    .floating-star {
      color: #FFD93D;
      animation: starFloat ease-in-out infinite;
      text-shadow: 0 0 4px rgba(255, 217, 61, 0.6);
    }

    @keyframes starFloat {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      20% { opacity: 0.8; }
      80% { opacity: 0.6; }
      100% {
        transform: translateY(-80vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* --- 蒸汽气泡 (厨师) --- */
    .steam {
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
      animation: steamRise ease-out infinite;
    }

    @keyframes steamRise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      20% { opacity: 0.6; }
      100% {
        transform: translateY(-70vh) scale(2);
        opacity: 0;
      }
    }

    /* 问题提示框 - 右侧 */
    .question-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 280px;
      position: relative;
      z-index: 10;
    }

    .question-box {
      background: #fff;
      border-radius: 20px;
      padding: 16px 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      width: 100%;
      border: 3px solid #FF6B9D;
    }

    .question-box::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-right: 14px solid #FF6B9D;
    }

    .question-top-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .question-letter {
      font-size: 56px;
      font-weight: 900;
      color: #FF6B9D;
      line-height: 1;
      text-shadow: 2px 2px 0 #FFE4EC;
      animation: letterBounce 1.2s ease-in-out infinite;
      min-width: 60px;
    }

    @keyframes letterBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .question-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFE4EC, #fff);
      border: 3px solid #FF6B9D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      animation: iconFloat 1.5s ease-in-out infinite;
      box-shadow: 0 4px 14px rgba(255,107,157,0.3);
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-4px) rotate(3deg); }
    }

    .question-word {
      font-size: 18px;
      color: #333;
      font-weight: 700;
      border-top: 2px dashed #eee;
      padding-top: 10px;
    }

    /* 物品清单 */
    .items-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .item-dot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: all 0.3s ease;
      opacity: 0.4;
      border: 2px solid #eee;
    }

    .item-dot.done {
      background: #D5F5E3;
      opacity: 1;
      transform: scale(1.05);
      border-color: #27AE60;
    }

    .item-dot.current {
      background: #FFE4EC;
      opacity: 1;
      border-color: #FF6B9D;
      transform: scale(1.15);
      animation: pulse 1.5s ease infinite;
      box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.2);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1.15); }
      50% { transform: scale(1.25); }
    }

    /* 星星特效 */
    .sparkle {
      position: absolute;
      font-size: 24px;
      pointer-events: none;
      animation: sparkle 0.8s ease-out forwards;
      z-index: 20;
    }

    @keyframes sparkle {
      0% {
        opacity: 0;
        transform: scale(0) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.2) rotate(180deg);
      }
      100% {
        opacity: 0;
        transform: scale(0.5) rotate(360deg) translateY(-30px);
      }
    }

    /* 答对/答错反馈 */
    .feedback {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
    }

    .feedback.show {
      animation: feedbackPop 0.8s ease-out;
    }

    @keyframes feedbackPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
      70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }

    /* 虚拟键盘 */
    .keyboard {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      width: 9vw;
      max-width: 50px;
      height: 50px;
      border: none;
      border-radius: 10px;
      background: #fff;
      font-size: 20px;
      font-weight: 700;
      color: #555;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.15s ease;
    }

    .key:active {
      transform: translateY(2px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      background: #FFE4EC;
      color: #FF6B9D;
    }

    .key.wrong {
      animation: wrongShake 0.4s ease;
      background: #FFE0E0;
      color: #E74C3C;
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .key.correct {
      background: #D5F5E3;
      color: #27AE60;
      transform: scale(1.1);
    }

    /* 庆祝页面 */
    .celebration {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 80px;
      z-index: 50;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .celebration.show {
      display: flex;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .celebration-card {
      background: #fff;
      border-radius: 24px;
      padding: 20px 36px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.5) translateY(50px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .celebration-emoji {
      font-size: 56px;
      margin-bottom: 8px;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .celebration-text {
      font-size: 22px;
      font-weight: 800;
      color: #FF6B9D;
      margin-bottom: 4px;
    }

    .celebration-sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }

    .celebration-btn {
      background: linear-gradient(135deg, #FF6B9D, #FF8FAB);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 107, 157, 0.4);
      transition: transform 0.2s;
    }

    .celebration-btn:active {
      transform: scale(0.95);
    }

    /* 彩带动画 */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      z-index: 60;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .game-area {
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }

      .bunny-container {
        width: min(35vh, 70vw);
        height: min(35vh, 70vw);
      }

      .question-panel {
        max-width: 90%;
      }

      .question-box {
        padding: 16px 20px;
      }

      .question-box::before {
        display: none;
      }

      .question-letter {
        font-size: 48px;
      }

      .item-dot {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }
    }

    @media (max-width: 600px) {
      .scene-title { font-size: 28px; }
      .scene-grid { gap: 12px; }
      .scene-card { padding: 15px; }
      .scene-card-emoji { font-size: 36px; }
      .scene-card-name { font-size: 16px; }
      .key { height: 44px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- 场景选择页 -->
  <div class="scene-select" id="sceneSelect">
    <div class="scene-title">👗 Dress Up Fun</div>
    <div class="scene-subtitle">Help the bunny get dressed!</div>
    <div class="scene-grid">
      <div class="scene-card" onclick="startGame('sunny')">
        <div class="scene-card-emoji">☀️</div>
        <div class="scene-card-name">Sunny Beach</div>
      </div>
      <div class="scene-card" onclick="startGame('pool')">
        <div class="scene-card-emoji">🏊</div>
        <div class="scene-card-name">Pool Day</div>
      </div>
      <div class="scene-card" onclick="startGame('rainy')">
        <div class="scene-card-emoji">☔</div>
        <div class="scene-card-name">Rainy Day</div>
      </div>
      <div class="scene-card" onclick="startGame('snowy')">
        <div class="scene-card-emoji">❄️</div>
        <div class="scene-card-name">Snowy Day</div>
      </div>
      <div class="scene-card" onclick="startGame('doctor')">
        <div class="scene-card-emoji">🩺</div>
        <div class="scene-card-name">Little Doctor</div>
      </div>
      <div class="scene-card" onclick="startGame('chef')">
        <div class="scene-card-emoji">👨‍🍳</div>
        <div class="scene-card-name">Little Chef</div>
      </div>
    </div>
    <div class="keyboard-hint">
      <kbd>←</kbd> <kbd>→</kbd> <kbd>↑</kbd> <kbd>↓</kbd> to select &nbsp;·&nbsp; <kbd>Enter</kbd> to start
    </div>
  </div>

  <!-- 游戏主页面 -->
  <div class="game-page" id="gamePage">
    <div class="top-bar">
      <button class="back-btn" onclick="backToSelect()">←</button>
      <div class="theme-info">
        <div class="theme-name">
          <span class="theme-emoji" id="themeEmoji">☀️</span>
          <span id="themeName">Sunny Beach</span>
        </div>
      </div>
      <div class="progress-text">
        <span id="currentNum">0</span> / <span id="totalNum">6</span>
      </div>
    </div>

    <div class="game-area" id="gameArea">
      <!-- 天气特效层 -->
      <div class="weather-effects" id="weatherEffects"></div>

      <!-- 兔子 - 左侧 -->
      <div class="bunny-container" id="bunnyContainer">
        <img class="bunny-img" id="bunnyImg" src="assets/sunny-start.jpg" alt="Bunny">
      </div>

      <!-- 问题提示 - 右侧 -->
      <div class="question-panel">
        <div class="question-box">
          <div class="question-top-row">
            <div class="question-letter" id="questionLetter">H</div>
            <div class="question-icon" id="questionIcon">👒</div>
          </div>
          <div class="question-word" id="questionWord">Hat</div>
        </div>
        <div class="items-list" id="itemsList"></div>
      </div>

      <div class="feedback" id="feedback">✨</div>
    </div>

    <div class="keyboard">
      <div class="keyboard-row">
        <button class="key" onclick="pressKey('Q')">Q</button>
        <button class="key" onclick="pressKey('W')">W</button>

    function selectScene(direction) {
      const total = themeOrder.length;
      if (direction === 'right' || direction === 'down') {
        selectedSceneIndex = (selectedSceneIndex + 1) % total;
      } else {
        selectedSceneIndex = (selectedSceneIndex - 1 + total) % total;
      }
      updateSceneSelection();
    }

      startGame(themeOrder[selectedSceneIndex]);

    // ========== 游戏逻辑 ==========
    function startGame(themeKey) {
      currentThemeKey = themeKey;
      currentItemIndex = 0;

      themeEmojiEl.textContent = theme.emoji;
      themeNameEl.textContent = theme.name;
      totalNumEl.textContent = theme.items.length;
      currentNumEl.textContent = '0';
      
      // 重置图片到起始状态
      bunnyImg.src = theme.startImg;
      bunnyImg.classList.remove('hidden', 'pop');
      
      // 生成物品清单
      renderItemsList();

      // 设置天气特效
      setWeather(themeKey);
      
      // 切换页面
      sceneSelect.classList.add('hidden');
      gamePage.classList.add('active');
      
      // 显示第一个问题
      updateQuestion();
      
      isAnswering = false;
    }

    function renderItemsList() {
      const theme = themes[currentThemeKey];
      itemsListEl.innerHTML = '';
      
      theme.items.forEach((item, index) => {
        const dot = document.createElement('div');
        dot.className = 'item-dot';
        dot.textContent = item.emoji;
        dot.title = item.word;
        itemsListEl.appendChild(dot);
      });
      
      updateItemsListState();
    }

    function updateItemsListState() {
      const dots = itemsListEl.querySelectorAll('.item-dot');
      dots.forEach((dot, index) => {
        dot.classList.remove('done', 'current');
        if (index < currentItemIndex) {
          dot.classList.add('done');
        } else if (index === currentItemIndex) {
          dot.classList.add('current');
        }
      });
    }

    function backToSelect() {
      gamePage.classList.remove('active');
      sceneSelect.classList.remove('hidden');
    }

    function updateQuestion() {
      const theme = themes[currentThemeKey];
      const item = theme.items[currentItemIndex];
      
      if (!item) {
        showCelebration();
        return;
      }
      
      questionLetterEl.textContent = item.letter;
      questionIconEl.textContent = item.emoji;
      questionWordEl.textContent = item.word;
      
      updateItemsListState();
      
      // 读一遍题目（字母+单词）
      setTimeout(() => playPronunciation(item.letter, item.word), 300);
    }

    function pressKey(letter) {
      if (isAnswering) return;
      
      const theme = themes[currentThemeKey];
      const item = theme.items[currentItemIndex];
      
      if (!item) return;
      
      const keyBtn = [...document.querySelectorAll('.key')].find(
        btn => btn.textContent === letter
      );
      
      if (letter.toUpperCase() === item.letter.toUpperCase()) {
        // 答对了！
        isAnswering = true;
        handleCorrect(keyBtn, item);
      } else {
        // 答错了
        handleWrong(keyBtn, letter);
      }
    }

    // ========== 语音发音 ==========
    // 音效上下文（用于生成错误/正确提示音）
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playWrongSound() {
      try {
        const ctx = getAudioCtx();
        // 确保音频上下文处于运行状态
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(150, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) {
        console.warn('Wrong sound error:', e);
      }
    }

    function playCorrectSound() {
      try {
        const ctx = getAudioCtx();
        // 确保音频上下文处于运行状态
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.08);
        osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.16);
        gain.gain.setValueAtTime(0.35, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
      } catch (e) {
        console.warn('Correct sound error:', e);
      }
    }

    function speakLetter(letter, callback) {
      if (!('speechSynthesis' in window)) {
        if (callback) callback();
        return;
      }
      const utterance = new SpeechSynthesisUtterance(letter);
      utterance.lang = 'en-US';
      utterance.rate = 0.8;
      utterance.pitch = 1.2;
      if (callback) {
        utterance.onend = callback;
      }
      speechSynthesis.speak(utterance);
    }

    function speakWord(word, callback) {
      if (!('speechSynthesis' in window)) {
        if (callback) callback();
        return;
      }
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'en-US';
      utterance.rate = 0.75;
      utterance.pitch = 1.1;
      utterance.onend = () => { if (callback) callback(); };
      speechSynthesis.speak(utterance);
    }

    function playPronunciation(letter, word, callback) {
      if (!('speechSynthesis' in window)) {
        if (callback) callback();
        return;
      }
      speechSynthesis.cancel();
      // 先读字母，读完再读单词，单词读完执行回调
      speakLetter(letter, () => {
        speakWord(word, () => {
          if (callback) callback();
        });
      });
    }

    function handleCorrect(keyBtn, item) {
      // 正确音效
      playCorrectSound();
      
      // 按键变绿
      if (keyBtn) {
        keyBtn.classList.add('correct');
        setTimeout(() => keyBtn.classList.remove('correct'), 500);
      }
      
      // 显示对号反馈
      feedbackEl.textContent = '✨';
      feedbackEl.classList.remove('show');
      void feedbackEl.offsetWidth; // 重启动画
      feedbackEl.classList.add('show');
      
      // 星星特效
      for (let i = 0; i < 8; i++) {
        setTimeout(() => spawnSparkle(), i * 60);
      }
      
      // 更新进度
      currentItemIndex++;
      currentNumEl.textContent = currentItemIndex;
      
      // 更新兔子图片（显示穿上新衣服的样子）
      const theme = themes[currentThemeKey];
      
      if (currentItemIndex >= theme.items.length) {
        // 全部穿完，先播放发音，再显示最终图
        playPronunciation(item.letter, item.word, () => {
          setTimeout(() => {
            bunnyImg.src = theme.finalImg;
            bunnyImg.classList.remove('pop');
            void bunnyImg.offsetWidth;
            bunnyImg.classList.add('pop');
            
            updateItemsListState();
            
            setTimeout(() => {
              showCelebration();
              isAnswering = false;
            }, 1200);
          }, 300);
        });
      } else {
        // 先切换到当前步骤图，等发音播完再进下一题
        setTimeout(() => {
          const currentStepItem = theme.items[currentItemIndex - 1];
          if (currentStepItem && currentStepItem.stepImg) {
            bunnyImg.src = currentStepItem.stepImg;
            bunnyImg.classList.remove('pop');
            void bunnyImg.offsetWidth;
            bunnyImg.classList.add('pop');
          }
          
          updateItemsListState();
          
          // 等发音播完再进入下一题
          playPronunciation(item.letter, item.word, () => {
            setTimeout(() => {
              updateQuestion();
              isAnswering = false;
            }, 300);
          });
        }, 500);
      }
    }

    function handleWrong(keyBtn, letter) {
      if (keyBtn) {
        keyBtn.classList.add('wrong');
        setTimeout(() => keyBtn.classList.remove('wrong'), 400);
      }
      
      // 错误音效
      playWrongSound();
      
      // 播放错误字母的发音
      if (letter) {
        speechSynthesis.cancel();
        speakLetter(letter);
      }
      
      // 显示错误字母提示
      if (letter) {
        feedbackEl.innerHTML = `<div style="font-size: 80px; font-weight: 900; color: #E74C3C; text-shadow: 3px 3px 0 #fff;">${letter.toUpperCase()}</div>`;
      } else {
        feedbackEl.textContent = '🤔';
      }
      feedbackEl.classList.remove('show');
      void feedbackEl.offsetWidth;
      feedbackEl.classList.add('show');
    }

    function spawnSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.textContent = ['✨', '⭐', '💫', '🌟'][Math.floor(Math.random() * 4)];
      
      const containerRect = bunnyContainer.getBoundingClientRect();
      const gameRect = gameArea.getBoundingClientRect();
      
      const x = containerRect.left - gameRect.left + Math.random() * containerRect.width;
      const y = containerRect.top - gameRect.top + Math.random() * containerRect.height * 0.7;
      
      sparkle.style.left = x + 'px';
      sparkle.style.top = y + 'px';
      sparkle.style.fontSize = (16 + Math.random() * 16) + 'px';
      
      gameArea.appendChild(sparkle);
      
      setTimeout(() => sparkle.remove(), 1000);
    }

    function showCelebration() {
      const theme = themes[currentThemeKey];
      celebrationEmoji.textContent = theme.celebrationEmoji;
      celebrationSub.textContent = theme.celebrationText;
      celebration.classList.add('show');
      
      // 彩带
      spawnConfetti();
    }

    function spawnConfetti() {
      const colors = ['#FF6B9D', '#FFD93D', '#6BCB77', '#4D96FF', '#FF8FAB', '#A8E6CF'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
          confetti.style.animationDelay = Math.random() * 0.5 + 's';
          confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          confetti.style.width = (6 + Math.random() * 8) + 'px';
          confetti.style.height = (6 + Math.random() * 8) + 'px';
          
          document.body.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 4000);
        }, i * 50);
      }
    }

    function nextTheme() {
      celebration.classList.remove('show');
      
      // 找到下一个主题
      const currentIndex = themeOrder.indexOf(currentThemeKey);
      const nextIndex = (currentIndex + 1) % themeOrder.length;
      const nextThemeKey = themeOrder[nextIndex];
      
      // 如果回到第一个，显示选择页
      if (nextIndex === 0) {
        backToSelect();
      } else {
        startGame(nextThemeKey);
      }
    }

    // ========== 键盘事件 ==========
    document.addEventListener('keydown', (e) => {
      const key = e.key;

      // 场景选择页
      if (!sceneSelect.classList.contains('hidden')) {
        if (key === 'ArrowLeft' || key === 'ArrowUp') {
          e.preventDefault();
          selectScene('left');
        } else if (key === 'ArrowRight' || key === 'ArrowDown') {
          e.preventDefault();
          selectScene('right');
        } else if (key === 'Enter' || key === ' ') {
          e.preventDefault();
          startSelectedScene();
        }
        return;
      }

      // 庆祝页面
      if (celebration.classList.contains('show')) {
        if (key === 'Enter' || key === ' ') {
          e.preventDefault();
          nextTheme();
        } else if (key === 'Escape') {
          e.preventDefault();
          celebration.classList.remove('show');
          backToSelect();
        }
        return;
      }

      // 游戏页 - Esc 返回
      if (key === 'Escape') {
        e.preventDefault();
        backToSelect();
        return;
      }

      // 游戏页 - 字母答题
      const letter = key.toUpperCase();
      if (/^[A-Z]$/.test(letter)) {
        pressKey(letter);
      }
    });

    // 初始化场景选中状态
    updateSceneSelection();
  </script>
</body>
</html>
